name: Release

# Build a Foundry-installable release whenever a version tag (v1.2.3) is pushed.
# Produces a GitHub release with module.json + module.zip attached, so the
# manifest URL  .../releases/latest/download/module.json  always resolves.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set version and download URL in module.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"
          jq --arg v "$VERSION" \
             --arg dl "https://github.com/$REPO/releases/download/$TAG/module.zip" \
             '.version = $v | .download = $dl' module.json > module.tmp.json
          mv module.tmp.json module.json

      - name: Create module.zip
        run: |
          zip -r module.zip \
            module.json \
            scripts \
            styles \
            templates \
            languages \
            LICENSE \
            README.md \
            CHANGELOG.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            module.json
            module.zip
